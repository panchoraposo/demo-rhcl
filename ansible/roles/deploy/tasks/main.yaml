---
- name: Render Argo CD Application manifest
  ansible.builtin.template:
    src: rhcl-workshop-application.yaml.j2
    dest: /tmp/rhcl-workshop-application.yaml
    mode: "0644"

- name: Apply Argo CD Application
  ansible.builtin.command: oc apply -f /tmp/rhcl-workshop-application.yaml
  register: apply_app
  changed_when: "'configured' in (apply_app.stdout | lower) or 'created' in (apply_app.stdout | lower)"

- name: Ensure rhcl-ai-bot namespace exists (for optional secrets)
  ansible.builtin.command: oc get namespace rhcl-ai-bot
  register: ns_ai_bot
  changed_when: false
  failed_when: false

- name: Create rhcl-ai-bot namespace if missing
  ansible.builtin.command: oc create namespace rhcl-ai-bot
  when: ns_ai_bot.rc != 0
  register: create_ns_ai_bot
  changed_when: "'created' in (create_ns_ai_bot.stdout | lower)"

- name: Create LLM API key secret (optional)
  ansible.builtin.shell: |
    set -euo pipefail
    oc -n rhcl-ai-bot apply -f - <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: rhcl-ai-bot-llm
      namespace: rhcl-ai-bot
    type: Opaque
    stringData:
      apiKey: "{{ llm_api_key }}"
    EOF
  args:
    executable: /bin/bash
  when: (llm_api_key | default('') | length) > 0
  register: llm_secret
  changed_when: "'configured' in (llm_secret.stdout | lower) or 'created' in (llm_secret.stdout | lower)"

- name: Wait for Argo CD Application to exist
  ansible.builtin.command: oc -n openshift-gitops get application rhcl-workshop
  register: get_app
  changed_when: false

- name: Print URLs
  ansible.builtin.debug:
    msg:
      - "Open: https://{{ demo_hostname }}/"
      - "Open: https://{{ oidc_hostname }}/"

