apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rhcl-workshop
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: storage
            path: gitops/apps/rhcl-demo/appsets/storage
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: infra
            path: gitops/apps/rhcl-demo/appsets/infra
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: demo
            path: gitops/apps/rhcl-demo/appsets/demo
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: bot
            path: gitops/apps/rhcl-demo/appsets/bot
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: keycloak
            path: gitops/apps/rhcl-demo/appsets/keycloak
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: oidc-portal
            path: gitops/apps/rhcl-demo/appsets/oidc-portal
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: tracing
            path: gitops/apps/rhcl-demo/appsets/tracing
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: lightspeed
            path: gitops/apps/rhcl-demo/appsets/lightspeed
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
          - name: mcp
            path: gitops/apps/rhcl-demo/appsets/mcp
            demoHostname: REPLACE_ME_DEMO_HOSTNAME
            oidcHostname: REPLACE_ME_OIDC_HOSTNAME
            clusterIssuer: REPLACE_ME_CLUSTER_ISSUER
  template:
    metadata:
      name: rhcl-workshop-{{.name}}
    spec:
      project: default
      source:
        repoURL: https://github.com/panchoraposo/demo-rhcl.git
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: ""
          kind: Namespace
          name: istio-system
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
        - group: apps
          kind: Deployment
          name: rhcl-ai-bot
          namespace: rhcl-ai-bot
          jsonPointers:
            - /spec/template/spec/containers/0/image
        - group: apps
          kind: Deployment
          name: rhcl-trace-svc
          namespace: demo
          jsonPointers:
            - /spec/template/spec/containers/0/image
        - group: cert-manager.io
          kind: Certificate
          name: rhcl-gw-tls
          namespace: openshift-ingress
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: tempo.grafana.com
          kind: TempoStack
          name: simplest
          namespace: rhcl-observability
          jsonPointers:
            - /metadata/annotations
            - /spec
            - /status
        - group: grafana.integreatly.org
          kind: Grafana
          name: rhcl-grafana
          namespace: monitoring
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: grafana.integreatly.org
          kind: GrafanaDatasource
          name: rhcl-thanos
          namespace: monitoring
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: grafana.integreatly.org
          kind: GrafanaDashboard
          namespace: monitoring
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: kiali.io
          kind: Kiali
          name: kiali
          namespace: istio-system
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: kuadrant.io
          kind: AuthPolicy
          name: rhcl-gw-auth
          namespace: openshift-ingress
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: kuadrant.io
          kind: DNSPolicy
          name: rhcl-oidc-dns
          namespace: openshift-ingress
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: sailoperator.io
          kind: Istio
          name: default
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: sailoperator.io
          kind: IstioCNI
          name: default
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: sailoperator.io
          kind: ZTunnel
          name: default
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: ""
          kind: ServiceAccount
          name: rhcl-grafana
          namespace: monitoring
          jsonPointers:
            - /imagePullSecrets
            - /secrets
            - /metadata/annotations
        - group: ""
          kind: ServiceAccount
          name: enable-kuadrant-console-plugin
          namespace: openshift-gitops
          jsonPointers:
            - /imagePullSecrets
            - /secrets
            - /metadata/annotations
        - group: ""
          kind: ServiceAccount
          name: rhcl-observability-bootstrap
          namespace: openshift-gitops
          jsonPointers:
            - /imagePullSecrets
            - /secrets
            - /metadata/annotations

  templatePatch: |
    {{- $parts := splitList "." .demoHostname -}}
    {{- $rev := reverse $parts -}}
    {{- $baseDomain := join "." (reverse (list (index $rev 2) (index $rev 1) (index $rev 0))) -}}
    spec:
      source:
        kustomize:
          patches:
          {{- if eq .name "infra" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: Gateway
                name: rhcl-gw
                namespace: openshift-ingress
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: Gateway
                metadata:
                  name: rhcl-gw
                  namespace: openshift-ingress
                spec:
                  listeners:
                    - name: http
                      port: 80
                      protocol: HTTP
                      allowedRoutes:
                        namespaces:
                          from: All
                    - name: https-main
                      port: 443
                      protocol: HTTPS
                      hostname: {{.demoHostname}}
                      tls:
                        mode: Terminate
                        certificateRefs:
                          - group: ""
                            kind: Secret
                            name: cert-manager-ingress-cert
                      allowedRoutes:
                        namespaces:
                          from: All
                    - name: https-oidc
                      port: 443
                      protocol: HTTPS
                      hostname: {{.oidcHostname}}
                      tls:
                        mode: Terminate
                        certificateRefs:
                          - group: ""
                            kind: Secret
                            name: cert-manager-ingress-cert
                      allowedRoutes:
                        namespaces:
                          from: All
                    - name: https-main-public
                      port: 443
                      protocol: HTTPS
                      hostname: rhcl-workshop.{{$baseDomain}}
                      tls:
                        mode: Terminate
                        certificateRefs:
                          - group: ""
                            kind: Secret
                            name: rhcl-gw-public-tls
                      allowedRoutes:
                        namespaces:
                          from: All
                    - name: https-oidc-public
                      port: 443
                      protocol: HTTPS
                      hostname: oidc-rhcl-workshop.{{$baseDomain}}
                      tls:
                        mode: Terminate
                        certificateRefs:
                          - group: ""
                            kind: Secret
                            name: rhcl-gw-public-tls
                      allowedRoutes:
                        namespaces:
                          from: All
                    - name: https-external-public
                      port: 443
                      protocol: HTTPS
                      hostname: external-api.{{$baseDomain}}
                      tls:
                        mode: Terminate
                        certificateRefs:
                          - group: ""
                            kind: Secret
                            name: rhcl-gw-public-tls
                      allowedRoutes:
                        namespaces:
                          from: All
            - target:
                group: cert-manager.io
                version: v1
                kind: Certificate
                name: rhcl-gw-public-tls
                namespace: openshift-ingress
              patch: |-
                apiVersion: cert-manager.io/v1
                kind: Certificate
                metadata:
                  name: rhcl-gw-public-tls
                  namespace: openshift-ingress
                spec:
                  dnsNames:
                    - rhcl-workshop.{{$baseDomain}}
                    - oidc-rhcl-workshop.{{$baseDomain}}
                    - mcp.{{$baseDomain}}
                    - external-api.{{$baseDomain}}
                    - external.{{$baseDomain}}
                  issuerRef:
                    name: {{.clusterIssuer}}
            - target:
                group: grafana.integreatly.org
                version: v1beta1
                kind: Grafana
                name: rhcl-grafana
                namespace: monitoring
              patch: |-
                apiVersion: grafana.integreatly.org/v1beta1
                kind: Grafana
                metadata:
                  name: rhcl-grafana
                  namespace: monitoring
                spec:
                  route:
                    spec:
                      host: {{ printf "grafana-%s" .demoHostname }}
          {{- end }}
          {{- if eq .name "demo" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: rhcl-ui
                namespace: demo
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: rhcl-ui
                  namespace: demo
                spec:
                  hostnames:
                    - {{.demoHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: demo-api
                namespace: demo
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: demo-api
                  namespace: demo
                spec:
                  hostnames:
                    - {{.demoHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: ab-demo
                namespace: demo-ab
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: ab-demo
                  namespace: demo-ab
                spec:
                  hostnames:
                    - {{.demoHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: jwt-demo
                namespace: demo-jwt
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: jwt-demo
                  namespace: demo-jwt
                spec:
                  hostnames:
                    - {{.demoHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: external-proxy-public
                namespace: demo
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: external-proxy-public
                  namespace: demo
                spec:
                  hostnames:
                    - external-api.{{$baseDomain}}
            - target:
                group: kuadrant.io
                version: v1
                kind: AuthPolicy
                name: jwt-demo-jwt
                namespace: demo-jwt
              patch: |-
                apiVersion: kuadrant.io/v1
                kind: AuthPolicy
                metadata:
                  name: jwt-demo-jwt
                  namespace: demo-jwt
                spec:
                  defaults:
                    rules:
                      authentication:
                        jwt:
                          jwt:
                            issuerUrl: https://{{.oidcHostname}}/auth/realms/rhcl
          {{- end }}
          {{- if eq .name "keycloak" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: keycloak
                namespace: rhcl-keycloak
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: keycloak
                  namespace: rhcl-keycloak
                spec:
                  hostnames:
                    - {{.demoHostname}}
                    - {{.oidcHostname}}
                    - rhcl-workshop.REPLACE_ME_BASE_DOMAIN
                    - oidc-rhcl-workshop.REPLACE_ME_BASE_DOMAIN
          {{- end }}
          {{- if eq .name "mcp" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: Gateway
                name: rhcl-mcp-gw
                namespace: openshift-ingress
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: Gateway
                metadata:
                  name: rhcl-mcp-gw
                  namespace: openshift-ingress
                spec:
                  listeners:
                    - name: http-mcp
                      hostname: mcp.{{$baseDomain}}
                    - name: https-mcp-public
                      hostname: mcp.{{$baseDomain}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: rhcl-mcp-gateway
                namespace: mcp-system
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: rhcl-mcp-gateway
                  namespace: mcp-system
                spec:
                  hostnames:
                    - mcp.{{$baseDomain}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: rhcl-mcp-tools
                namespace: mcp-system
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: rhcl-mcp-tools
                  namespace: mcp-system
                spec:
                  hostnames:
                    - mcp.{{$baseDomain}}
            - target:
                group: mcp.kuadrant.io
                version: v1alpha1
                kind: MCPGatewayExtension
                name: rhcl-mcp
                namespace: mcp-system
              patch: |-
                apiVersion: mcp.kuadrant.io/v1alpha1
                kind: MCPGatewayExtension
                metadata:
                  name: rhcl-mcp
                  namespace: mcp-system
                spec:
                  publicHost: mcp.{{$baseDomain}}
            - target:
                group: ""
                version: v1
                kind: Secret
                name: mcp-gateway-config
                namespace: mcp-system
              patch: |-
                apiVersion: v1
                kind: Secret
                metadata:
                  name: mcp-gateway-config
                  namespace: mcp-system
                stringData:
                  config.yaml: |
                    servers:
                      - enabled: true
                        hostname: mcp.{{$baseDomain}}
                        name: mcp-system/rhcl-mcp-tools
                        toolPrefix: tools_
                        url: https://mcp.{{$baseDomain}}/tools/rhcl-mcp-tools
            - target:
                group: apps
                version: v1
                kind: Deployment
                name: rhcl-mcp-tools
                namespace: mcp-system
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: rhcl-mcp-tools
                  namespace: mcp-system
                spec:
                  template:
                    spec:
                      containers:
                        - name: app
                          env:
                            - name: RHCL_AI_ESPN_BASE_URL
                              value: https://external-api.{{$baseDomain}}
          {{- end }}
          {{- if eq .name "bot" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: ai-bot
                namespace: rhcl-ai-bot
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: ai-bot
                  namespace: rhcl-ai-bot
                spec:
                  hostnames:
                    - {{ printf "ai-%s" .demoHostname }}
            - target:
                group: apps
                version: v1
                kind: Deployment
                name: rhcl-ai-bot
                namespace: rhcl-ai-bot
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: rhcl-ai-bot
                  namespace: rhcl-ai-bot
                spec:
                  template:
                    spec:
                      containers:
                        - name: app
                          env:
                            - name: RHCL_AI_ESPN_BASE_URL
                              value: https://external-api.{{$baseDomain}}
                            - name: RHCL_AI_MCP_BASE_URL
                              value: https://{{.demoHostname}}
          {{- end }}
          {{- if eq .name "oidc-portal" }}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: secure-demo
                namespace: rhcl-oidc-portal
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: secure-demo
                  namespace: rhcl-oidc-portal
                spec:
                  hostnames:
                    - {{.oidcHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: oidc-portal
                namespace: rhcl-oidc-portal
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: oidc-portal
                  namespace: rhcl-oidc-portal
                spec:
                  hostnames:
                    - {{.oidcHostname}}
            - target:
                group: gateway.networking.k8s.io
                version: v1
                kind: HTTPRoute
                name: oidc-callback
                namespace: rhcl-oidc-portal
              patch: |-
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: oidc-callback
                  namespace: rhcl-oidc-portal
                spec:
                  hostnames:
                    - {{.oidcHostname}}
            - target:
                group: extensions.kuadrant.io
                version: v1alpha1
                kind: OIDCPolicy
                name: secure-demo-oidc
                namespace: rhcl-oidc-portal
              patch: |-
                apiVersion: extensions.kuadrant.io/v1alpha1
                kind: OIDCPolicy
                metadata:
                  name: secure-demo-oidc
                  namespace: rhcl-oidc-portal
                spec:
                  provider:
                    issuerURL: https://{{.oidcHostname}}/auth/realms/rhcl
                    authorizationEndpoint: https://{{.oidcHostname}}/auth/realms/rhcl/protocol/openid-connect/auth
                    tokenEndpoint: https://{{.oidcHostname}}/auth/realms/rhcl/protocol/openid-connect/token
                    redirectURI: https://{{.oidcHostname}}/auth/callback
            - target:
                group: kuadrant.io
                version: v1
                kind: AuthPolicy
                name: secure-demo-jwt
                namespace: rhcl-oidc-portal
              patch: |-
                apiVersion: kuadrant.io/v1
                kind: AuthPolicy
                metadata:
                  name: secure-demo-jwt
                  namespace: rhcl-oidc-portal
                spec:
                  defaults:
                    rules:
                      authentication:
                        jwt:
                          jwt:
                            issuerUrl: https://{{.oidcHostname}}/auth/realms/rhcl
          {{- end }}

