apiVersion: v1
kind: ServiceAccount
metadata:
  name: enable-kuadrant-console-plugin
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "95"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enable-kuadrant-console-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "95"
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enable-kuadrant-console-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "95"
subjects:
  - kind: ServiceAccount
    name: enable-kuadrant-console-plugin
    namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: enable-kuadrant-console-plugin
---
apiVersion: batch/v1
kind: Job
metadata:
  name: enable-kuadrant-console-plugin
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "96"
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: enable-kuadrant-console-plugin
      restartPolicy: Never
      containers:
        - name: oc
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash","-lc"]
          args:
            - |
              set -euo pipefail
              plugin="kuadrant-console-plugin"
              existing="$(oc get consoles.operator.openshift.io/cluster -o jsonpath='{.spec.plugins[*]}' || true)"
              if echo " ${existing} " | grep -q " ${plugin} "; then
                echo "Console plugin already enabled: ${plugin}"
                exit 0
              fi
              echo "Enabling console plugin: ${plugin}"
              oc patch consoles.operator.openshift.io/cluster --type='json' -p "[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"${plugin}\"}]"
              echo "Done."

