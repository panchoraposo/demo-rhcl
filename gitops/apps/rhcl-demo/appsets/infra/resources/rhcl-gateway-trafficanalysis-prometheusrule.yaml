apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rhcl-gateway-trafficanalysis
  namespace: openshift-ingress
  labels:
    app: rhcl-gateway-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "93"
spec:
  groups:
    - name: rhcl.gateway.trafficanalysis
      rules:
        # Normalize gateway request metrics for Traffic Analysis views.
        # The upstream template filters by job name; in this demo cluster the job label differs,
        # so we filter by the gateway label which is set by the Kuadrant PodMonitor relabeling.
        - record: istio_requests_total
          expr: |
            label_replace(
              label_replace(
                label_replace(
                  label_replace(
                    label_replace(
                      istio_requests_total{namespace="openshift-ingress", reporter="source", gateway=~"rhcl-.*"},
                      "reporter", "destination", "reporter", "source"
                    ),
                    "destination_workload", "$1", "source_workload", "(.*)"
                  ),
                  "destination_workload_namespace", "$1", "source_workload_namespace", "(.*)"
                ),
                "destination_service_name", "$1", "gateway", "(.*)"
              ),
              "destination_service_namespace", "$1", "namespace", "(.*)"
            )

