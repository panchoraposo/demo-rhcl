apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rhcl-gateway-trafficanalysis
  namespace: openshift-ingress
  labels:
    app: rhcl-gateway-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "93"
spec:
  groups:
    - name: rhcl.gateway.trafficanalysis
      rules:
        # Normalize gateway request metrics for Traffic Analysis views.
        # The Traffic Analysis views expect `istio_requests_total` series keyed by gateway name.
        # We record a normalized series from the gateway scrape jobs (one job per gateway service).
        - record: istio_requests_total
          expr: |
            label_replace(
              label_replace(
                label_replace(
                  label_replace(
                    label_replace(
                      label_replace(
                        istio_requests_total{namespace="openshift-ingress", reporter="source", job=~"rhcl-.*"},
                        "reporter", "destination", "reporter", "source"
                      ),
                      "destination_service_name", "$1", "job", "(.*)"
                    ),
                    "destination_service_namespace", "$1", "namespace", "(.*)"
                  ),
                  "destination_workload", "$1", "job", "(.*)"
                ),
                "destination_workload_namespace", "$1", "namespace", "(.*)"
              ),
              "gateway", "$1", "job", "(.*)"
            )

