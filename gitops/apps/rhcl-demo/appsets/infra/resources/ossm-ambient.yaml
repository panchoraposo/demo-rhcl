apiVersion: v1
kind: Namespace
metadata:
  name: istio-cni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: ztunnel
  labels:
    istio-discovery: enabled
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# Deploy Istio in ambient profile (OSSM 3.x / Sail operator CRDs).
# Note: This assumes OpenShift Service Mesh 3.x is installed in the cluster.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespace: istio-system
  profile: ambient
  updateStrategy:
    type: InPlace
  version: v1.28.5
  values:
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
      extensionProviders:
        - name: otel
          opentelemetry:
            service: otel-collector.rhcl-observability.svc.cluster.local
            port: 4317
    pilot:
      trustedZtunnelNamespace: ztunnel
      # SNO-friendly settings: avoid extra istiod replicas (HPA)
      autoscaleEnabled: false
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
---
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
  namespace: istio-cni
  annotations:
    argocd.argoproj.io/sync-wave: "31"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespace: istio-cni
  profile: ambient
  version: v1.28.5
  values:
    cni:
      ambient:
        reconcileIptablesOnStartup: true
---
apiVersion: sailoperator.io/v1
kind: ZTunnel
metadata:
  name: default
  namespace: ztunnel
  annotations:
    argocd.argoproj.io/sync-wave: "32"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespace: ztunnel
  version: v1.28.5
  values:
    ztunnel:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi

