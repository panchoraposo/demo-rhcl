apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: rhcl-app-developer
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "98"
spec:
  instanceSelector:
    matchLabels:
      app: rhcl-grafana
  resyncPeriod: 30s
  uid: rhcl-app-dev
  folder: RHCL Workshop
  configMapRef:
    name: grafana-app-developer
    key: app_developer.json
---
