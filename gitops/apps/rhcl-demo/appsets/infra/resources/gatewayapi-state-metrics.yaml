apiVersion: v1
kind: ServiceAccount
metadata:
  name: gatewayapi-state-metrics
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "24"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gatewayapi-state-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "24"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gatewayapi-state-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "24"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gatewayapi-state-metrics
subjects:
  - kind: ServiceAccount
    name: gatewayapi-state-metrics
    namespace: openshift-ingress
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatewayapi-custom-resource-state
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "24"
data:
  custom-resource-state.yaml: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: gateway.networking.k8s.io
            kind: "Gateway"
            version: "v1"
          metricNamePrefix: gatewayapi_gateway
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metrics:
            - name: "info"
              help: "Gateway information"
              each:
                type: Info
                info:
                  labelsFromPath:
                    gatewayclass_name: [spec, gatewayClassName]
            - name: "status"
              help: "status condition"
              each:
                type: Gauge
                gauge:
                  path: [status, conditions]
                  labelsFromPath:
                    type: ["type"]
                  valueFrom: ["status"]
        - groupVersionKind:
            group: gateway.networking.k8s.io
            kind: "GatewayClass"
            version: "v1"
          metricNamePrefix: gatewayapi_gatewayclass
          labelsFromPath:
            name: [metadata, name]
          metrics:
            - name: "info"
              help: "GatewayClass information"
              each:
                type: Info
                info:
                  labelsFromPath:
                    controller_name: [spec, controllerName]
            - name: "status"
              help: "status condition"
              each:
                type: Gauge
                gauge:
                  path: [status, conditions]
                  labelsFromPath:
                    type: ["type"]
                  valueFrom: ["status"]
        - groupVersionKind:
            group: gateway.networking.k8s.io
            kind: "HTTPRoute"
            version: "v1"
          metricNamePrefix: gatewayapi_httproute
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metrics:
            - name: "status_parent_info"
              help: "Parent references that the httproute is attached to"
              each:
                type: Info
                info:
                  path: [status, parents]
                  labelsFromPath:
                    controller_name: ["controllerName"]
                    parent_group: ["parentRef", "group"]
                    parent_kind: ["parentRef", "kind"]
                    parent_name: ["parentRef", "name"]
                    parent_namespace: ["parentRef", "namespace"]
                    parent_section_name: ["parentRef", "sectionName"]
                    parent_port: ["parentRef", "port"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatewayapi-state-metrics
  namespace: openshift-ingress
  labels:
    app: gatewayapi-state-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatewayapi-state-metrics
  template:
    metadata:
      labels:
        app: gatewayapi-state-metrics
    spec:
      serviceAccountName: gatewayapi-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
          args:
            - --port=8080
            - --telemetry-port=8081
            - --custom-resource-state-only=true
            - --custom-resource-state-config-file=/config/custom-resource-state.yaml
          ports:
            - name: http
              containerPort: 8080
            - name: telemetry
              containerPort: 8081
          volumeMounts:
            - name: custom-state
              mountPath: /config
              readOnly: true
      volumes:
        - name: custom-state
          configMap:
            name: gatewayapi-custom-resource-state
            items:
              - key: custom-resource-state.yaml
                path: custom-resource-state.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: gatewayapi-state-metrics
  namespace: openshift-ingress
  labels:
    app: gatewayapi-state-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  selector:
    app: gatewayapi-state-metrics
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gatewayapi-state-metrics
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "26"
spec:
  namespaceSelector:
    matchNames:
      - openshift-ingress
  selector:
    matchLabels:
      app: gatewayapi-state-metrics
  endpoints:
    - port: http
      path: /metrics
      scheme: http
      interval: 30s

