apiVersion: v1
kind: Service
metadata:
  name: rhcl-gw-metrics
  namespace: openshift-ingress
  labels:
    app: rhcl-gateway-metrics
    gateway: rhcl-gw
spec:
  selector:
    gateway.networking.k8s.io/gateway-name: rhcl-gw
  ports:
    - name: metrics
      port: 15020
      protocol: TCP
      targetPort: 15020
    - name: envoy-prom
      port: 15090
      protocol: TCP
      targetPort: 15090
---
apiVersion: v1
kind: Service
metadata:
  name: rhcl-ai-gw-metrics
  namespace: openshift-ingress
  labels:
    app: rhcl-gateway-metrics
    gateway: rhcl-ai-gw
spec:
  selector:
    gateway.networking.k8s.io/gateway-name: rhcl-ai-gw
  ports:
    - name: metrics
      port: 15020
      protocol: TCP
      targetPort: 15020
    - name: envoy-prom
      port: 15090
      protocol: TCP
      targetPort: 15090

