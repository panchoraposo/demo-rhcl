apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-app-developer
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "97"
data:
  app_developer.json: |
    {
      "uid": "rhcl-app-dev",
      "title": "RHCL Workshop — App developer",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "svc",
            "type": "query",
            "datasource": null,
            "query": {
              "query": "label_values(istio_requests_total{destination_service_namespace=\"demo\"}, destination_service_name)",
              "refId": "StandardVariableQuery"
            },
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "current": { "selected": true, "text": "demo-api", "value": "demo-api" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Requests / second (by service)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"demo\",destination_service_name=~\"$svc\"}[1m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Errors / second (4xx + 5xx)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"demo\",destination_service_name=~\"$svc\",response_code=~\"4..|5..\"}[1m])) by (response_code)",
              "legendFormat": "{{response_code}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (ms)",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=\"demo\",destination_service_name=~\"$svc\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-platform-engineer
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "97"
data:
  platform_engineer.json: |
    {
      "uid": "rhcl-platform",
      "title": "RHCL Workshop — Platform engineer",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "gateway",
            "type": "query",
            "datasource": null,
            "query": {
              "query": "label_values(istio_requests_total{source_workload_namespace=\"openshift-ingress\",reporter=\"source\"}, source_workload)",
              "refId": "StandardVariableQuery"
            },
            "regex": "/rhcl-.*gw.*/",
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "current": { "selected": true, "text": "rhcl-gw-openshift-default", "value": "rhcl-gw-openshift-default" }
          }
        ]
      },
      "panels": [
        {
          "id": 10,
          "type": "timeseries",
          "title": "Total requests / second (by gateway)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"openshift-ingress\",source_workload=~\"$gateway\"}[1m])) by (source_workload)",
              "legendFormat": "{{source_workload}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Successful requests / second (2xx + 3xx)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"openshift-ingress\",source_workload=~\"$gateway\",response_code=~\"2..|3..\"}[1m])) by (source_workload)",
              "legendFormat": "{{source_workload}}"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Error rate (4xx+5xx / total)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"openshift-ingress\",source_workload=~\"$gateway\",response_code=~\"4..|5..\"}[1m])) / sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"openshift-ingress\",source_workload=~\"$gateway\"}[1m]))",
              "legendFormat": "error rate"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Error codes / second (4xx + 5xx)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum(rate(istio_requests_total{reporter=\"source\",source_workload_namespace=\"openshift-ingress\",source_workload=~\"$gateway\",response_code=~\"4..|5..\"}[1m])) by (response_code))",
              "legendFormat": "{{response_code}}"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-business-user
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "97"
data:
  business_user.json: |
    {
      "uid": "rhcl-business",
      "title": "RHCL Workshop — Business user",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 20,
          "type": "timeseries",
          "title": "Traffic summary (requests / second)",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(6, sum(rate(istio_requests_total{destination_service_namespace=\"demo\"}[1m])) by (destination_service_name))",
              "legendFormat": "{{destination_service_name}}"
            }
          ]
        },
        {
          "id": 21,
          "type": "table",
          "title": "Total requests (selected range)",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(istio_requests_total{destination_service_namespace=\"demo\"}[$__range])) by (destination_service_name)",
              "format": "table",
              "instant": true
            }
          ]
        }
      ]
    }

