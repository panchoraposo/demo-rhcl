apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: rhcl-grafana
  namespace: monitoring
  labels:
    app: rhcl-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "96"
spec:
  config:
    auth:
      disable_login_form: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Viewer
    log:
      mode: console
  route:
    spec:
      host: REPLACE_ME_GRAFANA_HOSTNAME
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

