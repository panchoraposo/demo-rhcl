apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: kuadrant-mcp-allow
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "32"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: kuadrant-mcp
  defaults:
    rules:
      authorization:
        allow-all:
          opa:
            rego: "allow = true"

