apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-otel
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "40"
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: mcp-otel
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "41"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: deployment
  serviceAccount: mcp-otel
  config:
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317

    exporters:
      otlp/tempo:
        endpoint: tempo-simplest-distributor.rhcl-observability.svc.cluster.local:4317
        headers:
          X-Scope-OrgID: dev
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo, debug]

