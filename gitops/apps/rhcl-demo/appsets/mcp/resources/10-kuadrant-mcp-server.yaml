apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuadrant-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kuadrant-mcp-server
  template:
    metadata:
      labels:
        app: kuadrant-mcp-server
    spec:
      containers:
        - name: server
          image: ghcr.io/kuadrant/kuadrant-mcp-server:latest
          args:
            - "-transport"
            - "http"
            - "-addr"
            - ":8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kuadrant-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  selector:
    app: kuadrant-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080

