apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-demo-to-rhcl-mcp-tools-bridge
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "33"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: demo
  to:
    - group: ""
      kind: Service
      name: rhcl-mcp-tools-bridge

