apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhcl-mcp-tools
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhcl-mcp-tools
  template:
    metadata:
      labels:
        app: rhcl-mcp-tools
    spec:
      containers:
        - name: app
          # Reuse the workshop bot image as a tool server.
          # OpenShift internal registry reference: <registry>/<namespace>/<imagestream>:<tag>
          image: image-registry.openshift-image-registry.svc:5000/rhcl-ai-bot/rhcl-ai-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RHCL_AI_ESPN_BASE_URL
              value: https://external-api.REPLACE_ME_BASE_DOMAIN
            # Traces (OTLP) - exported to the MCP namespace collector.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://mcp-otel-collector.mcp-system.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: rhcl-mcp-tools
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rhcl-mcp-tools
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  selector:
    # NOTE: mcp-gateway's internal client resolves the tool server by Service name.
    # Point this Service at the bridge so initialize/tools/call works with strict Accept handling.
    app: rhcl-mcp-tools-bridge
  ports:
    - name: http
      port: 8080
      targetPort: 8080

