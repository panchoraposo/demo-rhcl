apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-config
  namespace: mcp-system
  labels:
    app: mcp-gateway
    mcp.kuadrant.io/aggregated: "true"
    mcp.kuadrant.io/secret: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "21"
type: Opaque
stringData:
  config.yaml: |
    servers:
      - enabled: true
        hostname: REPLACE_ME_MCP_HOSTNAME
        name: mcp-system/rhcl-mcp-tools
        toolPrefix: tools_
        # Use the in-cluster bridge to avoid traversing the public Gateway policies.
        # NOTE: mcp-gateway treats this as a base URL and appends MCP paths internally,
        # so we intentionally do NOT include a trailing /mcp here.
        url: http://rhcl-mcp-tools-bridge.mcp-system.svc.cluster.local:8080

