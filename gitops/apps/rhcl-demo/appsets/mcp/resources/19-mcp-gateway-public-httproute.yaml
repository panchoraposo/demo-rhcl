apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rhcl-mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-mcp-gw
      namespace: openshift-ingress
      sectionName: https-mcp-public
  hostnames:
    - REPLACE_ME_MCP_HOSTNAME
  rules:
    - matches:
        - method: POST
          path:
            type: PathPrefix
            value: /mcp
        - method: OPTIONS
          path:
            type: PathPrefix
            value: /mcp
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: access-control-allow-origin
                value: "*"
              - name: access-control-allow-methods
                value: "GET,POST,OPTIONS,HEAD"
              - name: access-control-allow-headers
                value: "content-type,authorization,accept,origin,x-requested-with,mcp-session-id"
              - name: access-control-expose-headers
                value: "mcp-session-id"
      backendRefs:
        - group: ""
          kind: Service
          name: mcp-gateway
          port: 8080
          weight: 1

