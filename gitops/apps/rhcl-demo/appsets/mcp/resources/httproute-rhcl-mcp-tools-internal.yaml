apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rhcl-mcp-tools-internal
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-mcp-gw
      namespace: openshift-ingress
      sectionName: http-mcp
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: ""
          kind: Service
          name: rhcl-mcp-tools-bridge
          port: 8080
          weight: 1

