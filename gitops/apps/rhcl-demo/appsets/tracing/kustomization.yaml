apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources/namespace-observability.yaml
  - resources/namespace-tempo-operator.yaml
  - resources/tempo-operator.yaml
  # OpenTelemetry operator is already present on many clusters (and OLM will fail if
  # we try to install it twice). We only deploy a collector instance for the demo.
  - resources/odf-object-bucket.yaml
  - resources/tempostack.yaml
  - resources/networkpolicy-allow-mcp-to-tempo-distributor.yaml
  - resources/networkpolicy-allow-otel-to-tempo-distributor.yaml
  - resources/networkpolicy-allow-grafana-to-tempo-query-frontend.yaml
  - resources/tempo-tenant-rbac.yaml
  - resources/otel-collector.yaml
  # NOTE: Cluster observability UI plugin is intentionally excluded to keep the demo
  # tracing stack independent of additional OLM operators.

