apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources/namespace-observability.yaml
  - resources/cluster-observability-operator.yaml
  - resources/namespace-tempo-operator.yaml
  - resources/tempo-operator.yaml
  - resources/namespace-opentelemetry-operator.yaml
  - resources/opentelemetry-operator.yaml
  - resources/namespace-opentelemetry.yaml
  # OpenTelemetry operator is already present on many clusters (and OLM will fail if
  # we try to install it twice). We only deploy a collector instance for the demo.
  - resources/minio-tempo-storage.yaml
  - resources/otel-collector.yaml
  - resources/uiplugin-distributed-tracing.yaml
  - resources/distributed-tracing-auth-proxy.yaml
  - resources/patch-consoleplugin-distributed-tracing-proxy.yaml

