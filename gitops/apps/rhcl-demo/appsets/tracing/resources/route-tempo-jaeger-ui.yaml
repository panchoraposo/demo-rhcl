apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: tempo-jaeger
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "70"
spec:
  to:
    kind: Service
    name: tempo-jaeger-ui
  port:
    targetPort: jaeger-ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

