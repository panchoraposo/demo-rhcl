apiVersion: v1
kind: ConfigMap
metadata:
  name: distributed-tracing-auth-proxy-nginx
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "91"
data:
  proxy.conf: |
    # Serve HTTPS on 9443 using service-ca injected cert.
    server {
      listen 9443 ssl;
      server_name _;

      ssl_certificate     /var/serving-cert/tls.crt;
      ssl_certificate_key /var/serving-cert/tls.key;

      location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Preserve the user token injected by console proxy.
        proxy_set_header Authorization $http_authorization;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_pass https://distributed-tracing.openshift-cluster-observability-operator.svc.cluster.local:9443;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-tracing-auth-proxy
  namespace: openshift-cluster-observability-operator
  labels:
    app: distributed-tracing-auth-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "92"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: distributed-tracing-auth-proxy
  template:
    metadata:
      labels:
        app: distributed-tracing-auth-proxy
    spec:
      containers:
        - name: nginx
          image: registry.redhat.io/ubi10/nginx-126:10.1
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          ports:
            - name: https
              containerPort: 9443
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: serving-cert
              mountPath: /var/serving-cert
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: distributed-tracing-auth-proxy-nginx
            items:
              - key: proxy.conf
                path: default.conf
        - name: serving-cert
          secret:
            secretName: distributed-tracing-auth-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: distributed-tracing-auth-proxy
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "91"
    service.beta.openshift.io/serving-cert-secret-name: distributed-tracing-auth-proxy-tls
  labels:
    app: distributed-tracing-auth-proxy
spec:
  selector:
    app: distributed-tracing-auth-proxy
  ports:
    - name: https
      port: 9443
      targetPort: 9443

