apiVersion: v1
kind: ServiceAccount
metadata:
  name: consoleplugin-patcher
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "93"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: consoleplugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "93"
rules:
  - apiGroups: ["console.openshift.io"]
    resources: ["consoleplugins"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: consoleplugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "93"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: consoleplugin-patcher
subjects:
  - kind: ServiceAccount
    name: consoleplugin-patcher
    namespace: openshift-cluster-observability-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-distributed-tracing-consoleplugin-proxy
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "94"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: consoleplugin-patcher
      containers:
        - name: oc
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash","-lc"]
          args:
            - |
              set -euo pipefail
              echo "Patching ConsolePlugin proxy to use distributed-tracing-auth-proxy..."
              oc patch consoleplugin distributed-tracing-console-plugin --type='json' -p='[
                {"op":"replace","path":"/spec/proxy/0/endpoint/service/name","value":"distributed-tracing-auth-proxy"}
              ]'
              echo "OK"

