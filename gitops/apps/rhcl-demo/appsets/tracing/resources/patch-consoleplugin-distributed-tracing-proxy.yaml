apiVersion: v1
kind: ServiceAccount
metadata:
  name: consoleplugin-patcher
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "93"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: consoleplugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "93"
rules:
  - apiGroups: ["console.openshift.io"]
    resources: ["consoleplugins"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: consoleplugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "93"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: consoleplugin-patcher
subjects:
  - kind: ServiceAccount
    name: consoleplugin-patcher
    namespace: openshift-cluster-observability-operator
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: patch-distributed-tracing-consoleplugin-proxy
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "94"
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: consoleplugin-patcher
          containers:
            - name: oc
              image: registry.redhat.io/openshift4/ose-cli:latest
              command: ["/bin/bash","-lc"]
              args:
                - |
                  set -euo pipefail
                  oc patch consoleplugin distributed-tracing-console-plugin --type='json' -p='[
                    {"op":"replace","path":"/spec/proxy/0/endpoint/service/name","value":"distributed-tracing-auth-proxy"}
                  ]'

