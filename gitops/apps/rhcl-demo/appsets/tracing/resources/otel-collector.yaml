apiVersion: v1
kind: ServiceAccount
metadata:
  name: connectivity-link-collector
  namespace: openshift-opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "40"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhcl-observability-otel-k8sattributes
  annotations:
    argocd.argoproj.io/sync-wave: "40"
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhcl-observability-otel-k8sattributes
  annotations:
    argocd.argoproj.io/sync-wave: "40"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhcl-observability-otel-k8sattributes
subjects:
  - kind: ServiceAccount
    name: connectivity-link-collector
    namespace: openshift-opentelemetry
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: connectivity-link-collector
  namespace: openshift-opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "41"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: deployment
  serviceAccount: connectivity-link-collector
  volumes:
    - name: tempo-client-mtls
      secret:
        secretName: tempo-simplest-gateway-mtls
    - name: tempo-ca-bundle
      configMap:
        name: tempo-simplest-ca-bundle
        items:
          - key: service-ca.crt
            path: service-ca.crt
  volumeMounts:
    - name: tempo-client-mtls
      mountPath: /etc/tempo-client
      readOnly: true
    - name: tempo-ca-bundle
      mountPath: /etc/tempo-ca
      readOnly: true
  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}

    processors:
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: connection

    exporters:
      otlp/tempo:
        endpoint: tempo-simplest-distributor.rhcl-observability.svc.cluster.local:4317
        headers:
          X-Scope-OrgID: dev
        tls:
          ca_file: /etc/tempo-ca/service-ca.crt
          cert_file: /etc/tempo-client/tls.crt
          key_file: /etc/tempo-client/tls.key
          insecure: false
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - k8sattributes
          exporters:
            - otlp/tempo
            - debug

