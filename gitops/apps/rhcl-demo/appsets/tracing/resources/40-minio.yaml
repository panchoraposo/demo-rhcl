apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "20"
type: Opaque
stringData:
  rootUser: minio
  rootPassword: minio12345
---
# Secret consumed by TempoStack for S3-compatible storage.
apiVersion: v1
kind: Secret
metadata:
  name: minio
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "20"
type: Opaque
stringData:
  endpoint: http://minio.rhcl-observability.svc:9000
  bucket: tempo
  access_key_id: minio
  access_key_secret: minio12345
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: rhcl-observability
  labels:
    app: minio
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootPassword
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-make-bucket
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  template:
    metadata:
      labels:
        app: minio-make-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootPassword
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              mc alias set local http://minio.rhcl-observability.svc:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/tempo

