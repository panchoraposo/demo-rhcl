apiVersion: batch/v1
kind: Job
metadata:
  name: tempo-jaeger-query-disable-client-mtls
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "99"
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: tempo-jaeger-query-patcher
      restartPolicy: Never
      containers:
        - name: oc
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash","-lc"]
          args:
            - |
              set -euo pipefail
              ns="rhcl-observability"
              dep="tempo-simplest-query-frontend"

              echo "Patching ${ns}/${dep} to disable client-certificate requirement on Jaeger Query..."

              oc -n "${ns}" patch deployment "${dep}" --type='json' -p='[
                {
                  "op":"replace",
                  "path":"/spec/template/spec/containers/1/args",
                  "value":[
                    "--query.base-path=/",
                    "--span-storage.type=grpc",
                    "--grpc-storage.server=127.0.0.1:7777",
                    "--query.bearer-token-propagation=true",
                    "--multi-tenancy.enabled=true",
                    "--multi-tenancy.header=x-scope-orgid",
                    "--query.http.tls.enabled=true",
                    "--query.http.tls.key=/var/run/tls/server/tls.key",
                    "--query.http.tls.cert=/var/run/tls/server/tls.crt",
                    "--query.grpc.tls.enabled=true",
                    "--query.grpc.tls.key=/var/run/tls/server/tls.key",
                    "--query.grpc.tls.cert=/var/run/tls/server/tls.crt"
                  ]
                }
              ]'

              echo "Waiting for rollout..."
              oc -n "${ns}" rollout status deployment "${dep}" --timeout=180s
              echo "OK"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo-jaeger-query-patcher
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "98"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tempo-jaeger-query-patcher
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "98"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tempo-jaeger-query-patcher
  namespace: rhcl-observability
  annotations:
    argocd.argoproj.io/sync-wave: "98"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tempo-jaeger-query-patcher
subjects:
  - kind: ServiceAccount
    name: tempo-jaeger-query-patcher
    namespace: rhcl-observability
