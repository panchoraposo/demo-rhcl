apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-mcp-config
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "30"
data:
  mcp-viewer-config.toml: |
    toolsets = ["core","kiali"]
    read_only = true

    [toolset_configs.kiali]
    # Use the in-cluster service to avoid needing the external Route hostname.
    url = "https://kiali.istio-system.svc.cluster.local:20001"
    insecure = true

