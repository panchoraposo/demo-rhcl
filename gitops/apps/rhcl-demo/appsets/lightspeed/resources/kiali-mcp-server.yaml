apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp-server
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "31"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
    spec:
      serviceAccountName: kubernetes-mcp-server
      automountServiceAccountToken: true
      containers:
        - name: mcp-server
          image: quay.io/containers/kubernetes_mcp_server:latest
          args:
            - "--port=8080"
            - "--config=/etc/mcp/mcp-viewer-config.toml"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config-vol
              mountPath: /etc/mcp
      volumes:
        - name: config-vol
          configMap:
            name: kubernetes-mcp-config
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "33"
spec:
  selector:
    app: kubernetes-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080

