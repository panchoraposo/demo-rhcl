apiVersion: kuadrant.io/v1
kind: TLSPolicy
metadata:
  name: rhcl-ai-sandbox-tls
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: rhcl-ai-gw
    sectionName: https-ai-sandbox
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production-sandbox921
---
