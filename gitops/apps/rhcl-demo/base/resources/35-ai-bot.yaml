apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rhcl-ai-bot
  namespace: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec: {}
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: rhcl-ai-bot
  namespace: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  triggers:
    - type: ConfigChange
  source:
    type: Git
    git:
      uri: https://github.com/panchoraposo/demo-rhcl.git
    contextDir: apps/rhcl-ai-bot
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: rhcl-ai-bot:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhcl-ai-bot
  namespace: rhcl-ai-bot
  labels:
    app: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "13"
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"rhcl-ai-bot:latest","namespace":"rhcl-ai-bot"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhcl-ai-bot
  template:
    metadata:
      labels:
        app: rhcl-ai-bot
    spec:
      containers:
        - name: app
          image: rhcl-ai-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            # Allow the workshop UI (different hostname) to call this API directly
            - name: QUARKUS_HTTP_CORS
              value: "true"
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: "/.*/"
            - name: QUARKUS_HTTP_CORS_METHODS
              value: "GET,POST,OPTIONS"
            - name: QUARKUS_HTTP_CORS_HEADERS
              value: "accept,authorization,content-type,origin,x-requested-with"
            - name: QUARKUS_HTTP_CORS_EXPOSED_HEADERS
              value: "mcp-session-id"
            # Optional: enable real LLM calls (OpenAI-compatible)
            - name: RHCL_AI_OPENAI_BASE_URL
              value: https://litellm-prod.apps.maas.redhatworkshops.io/v1
            - name: RHCL_AI_OPENAI_MODEL
              value: deepseek-r1-distill-qwen-14b
            - name: RHCL_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rhcl-ai-bot-llm
                  key: apiKey
                  optional: true
            # Tool calls go through the existing in-cluster ESPN proxy
            - name: RHCL_AI_ESPN_BASE_URL
              value: http://external-proxy.demo.svc.cluster.local
            - name: RHCL_AI_TRACE_BASE_URL
              value: http://rhcl-trace-svc.demo.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rhcl-ai-bot
  namespace: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  selector:
    app: rhcl-ai-bot
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080

