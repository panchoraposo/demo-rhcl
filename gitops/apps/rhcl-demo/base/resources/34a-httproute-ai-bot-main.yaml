apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-bot-main
  namespace: rhcl-ai-bot
  labels:
    app: rhcl-ai-bot
    service: rhcl-ai-bot
    deployment: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: POST
          path:
            type: PathPrefix
            value: /ai
        - method: OPTIONS
          path:
            type: PathPrefix
            value: /ai
      backendRefs:
        - group: ""
          kind: Service
          name: rhcl-ai-bot
          port: 80
          weight: 1

