apiVersion: apps/v1
kind: Deployment
metadata:
  name: ab-a
  namespace: demo-ab
  labels:
    app: ab
    version: a
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ab
      version: a
  template:
    metadata:
      labels:
        app: ab
        version: a
    spec:
      containers:
        - name: nginx
          image: registry.redhat.io/ubi10/nginx-126:10.1
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: cfg
              mountPath: /opt/app-root/etc/nginx.default.d
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: ab-a-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ab-a-nginx
  namespace: demo-ab
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  ab-a.conf: |
    # Included in the default server block by the UBI nginx image.
    location / {
      add_header content-type text/plain;
      return 200 "A\n";
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ab-a
  namespace: demo-ab
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: ab
    version: a
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
---
