apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secure-demo
  namespace: rhcl-oidc-portal
  labels:
    app: secure-demo
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - oidc-rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: GET
          path:
            type: Exact
            value: /oidc/callback
        - method: HEAD
          path:
            type: Exact
            value: /oidc/callback
        - method: GET
          path:
            type: PathPrefix
            value: /portal-login
        - method: HEAD
          path:
            type: PathPrefix
            value: /portal-login
      backendRefs:
        - group: ""
          kind: Service
          name: rhcl-oidc-ui
          namespace: rhcl-oidc-portal
          port: 80
          weight: 1
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /secure
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /external
      backendRefs:
        - group: ""
          kind: Service
          name: external-proxy
          namespace: demo
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oidc-portal
  namespace: rhcl-oidc-portal
  labels:
    app: rhcl-oidc-ui
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - oidc-rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /
        - method: HEAD
          path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: rhcl-oidc-ui
          namespace: rhcl-oidc-portal
          port: 80
          weight: 1

