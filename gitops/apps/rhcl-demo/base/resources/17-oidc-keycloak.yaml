apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "11"
type: Opaque
stringData:
  username: keycloak
  password: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: demo
  labels:
    app: keycloak-db
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              value: keycloak
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: keycloak-db
  ports:
    - name: pg
      port: 5432
      protocol: TCP
      targetPort: 5432
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "13"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  ingress:
    enabled: false
  db:
    vendor: postgres
    host: keycloak-db
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    httpEnabled: true
  hostname:
    strict: false
  proxy:
    headers: xforwarded
  additionalOptions:
    - name: http-relative-path
      value: /auth
  unsupported:
    podTemplate:
      spec:
        volumes:
          - name: rhcl-theme
            configMap:
              name: keycloak-theme-rhcl
              items:
                - key: theme.properties
                  path: rhcl/login/theme.properties
                - key: rhcl.css
                  path: rhcl/login/resources/css/rhcl.css
        containers:
          - name: keycloak
            volumeMounts:
              - name: rhcl-theme
                mountPath: /opt/keycloak/themes
                readOnly: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-theme-rhcl
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
data:
  theme.properties: |
    parent=keycloak.v2
    import=common/keycloak
    styles=css/rhcl.css
  rhcl.css: |
    :root{
      --rhcl-bg0:#070a12;
      --rhcl-bg1:#0b1020;
      --rhcl-card: rgba(15,22,48,.72);
      --rhcl-line: rgba(255,255,255,.10);
      --rhcl-text:#eaf1ff;
      --rhcl-muted:#a7b3d4;
      --rhcl-accent:#7c5cff;
      --rhcl-accent2:#38bdf8;
      --rhcl-good:#22c55e;
    }

    body{
      background:
        radial-gradient(1200px 700px at 18% 12%, rgba(124,92,255,.32), transparent 55%),
        radial-gradient(1000px 700px at 84% 30%, rgba(56,189,248,.22), transparent 60%),
        linear-gradient(180deg, var(--rhcl-bg0), var(--rhcl-bg1));
      color: var(--rhcl-text);
    }

    .pf-v5-c-login{
      background: transparent !important;
    }

    .pf-v5-c-login__main{
      border:1px solid var(--rhcl-line);
      border-radius:18px;
      background: var(--rhcl-card);
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }

    .pf-v5-c-title, .pf-v5-c-form__label-text{
      color: var(--rhcl-text) !important;
    }

    .pf-v5-c-form__helper-text, .pf-v5-c-content, .pf-v5-c-login__main-footer-band-item{
      color: var(--rhcl-muted) !important;
    }

    .pf-v5-c-button.pf-m-primary{
      background: linear-gradient(90deg, rgba(124,92,255,.95), rgba(56,189,248,.80));
      border: 1px solid rgba(124,92,255,.55);
      border-radius: 12px;
      font-weight: 650;
      box-shadow: 0 10px 24px rgba(124,92,255,.22);
    }

    .pf-v5-c-button.pf-m-primary:hover{
      filter: brightness(1.05);
    }

    .pf-v5-c-form-control{
      border-radius: 12px;
      border-color: rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--rhcl-text);
    }

    .pf-v5-c-form-control:focus{
      box-shadow: 0 0 0 3px rgba(124,92,255,.25);
      border-color: rgba(124,92,255,.55);
    }

    /* Subtle RHCL mark on header */
    .pf-v5-c-login__header::after{
      content: "RHCL Workshop";
      display:block;
      margin-top:8px;
      font-size:12px;
      letter-spacing:.18em;
      text-transform: uppercase;
      color: rgba(234,241,255,.72);
    }
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rhcl-realm
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  keycloakCRName: keycloak
  realm:
    realm: rhcl
    enabled: true
    loginTheme: rhcl
    accountTheme: rhcl
    clients:
      - clientId: rhcl-ui
        enabled: true
        publicClient: true
        directAccessGrantsEnabled: true
        standardFlowEnabled: true
        redirectUris:
          - "*"
        webOrigins:
          - "*"
    users:
      - username: demo
        enabled: true
        firstName: Demo
        lastName: User
        email: demo@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secure-api
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  note: |
    Secure backend for OIDC demo.
    This is an httpbin-style service so we can demo:
    - request headers
    - JSON responses
    - realistic protected API calls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-api
  namespace: demo
  labels:
    app: secure-api
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-api
  template:
    metadata:
      labels:
        app: secure-api
    spec:
      containers:
        - name: httpbin
          image: ghcr.io/mccutchen/go-httpbin:2.22.1
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: secure-api
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: secure-api
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080

