apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "11"
type: Opaque
stringData:
  username: keycloak
  password: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: demo
  labels:
    app: keycloak-db
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              value: keycloak
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: keycloak-db
  ports:
    - name: pg
      port: 5432
      protocol: TCP
      targetPort: 5432
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "13"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  ingress:
    enabled: false
  db:
    vendor: postgres
    host: keycloak-db
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    httpEnabled: true
  hostname:
    strict: false
  proxy:
    headers: xforwarded
  additionalOptions:
    - name: http-relative-path
      value: /auth
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rhcl-realm
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  keycloakCRName: keycloak
  realm:
    realm: rhcl
    enabled: true
    clients:
      - clientId: rhcl-ui
        enabled: true
        publicClient: true
        directAccessGrantsEnabled: true
        standardFlowEnabled: true
        redirectUris:
          - "*"
        webOrigins:
          - "*"
    users:
      - username: demo
        enabled: true
        firstName: Demo
        lastName: User
        email: demo@example.com
        emailVerified: true
        credentials:
          - type: password
            value: demo
            temporary: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secure-api
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  note: |
    Secure backend for OIDC demo.
    This is an httpbin-style service so we can demo:
    - request headers
    - JSON responses
    - realistic protected API calls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-api
  namespace: demo
  labels:
    app: secure-api
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-api
  template:
    metadata:
      labels:
        app: secure-api
    spec:
      containers:
        - name: httpbin
          image: ghcr.io/mccutchen/go-httpbin:2.22.1
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: secure-api
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: secure-api
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080

