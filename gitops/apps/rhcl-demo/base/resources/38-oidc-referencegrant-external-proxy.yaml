apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-oidc-portal-to-external-proxy
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "29"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: rhcl-oidc-portal
  to:
    - group: ""
      kind: Service
      name: external-proxy

