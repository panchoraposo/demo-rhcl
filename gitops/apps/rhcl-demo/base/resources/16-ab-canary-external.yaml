apiVersion: apps/v1
kind: Deployment
metadata:
  name: ab-a
  namespace: demo
  labels:
    app: ab-a
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ab-a
  template:
    metadata:
      labels:
        app: ab-a
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: ab-a-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ab-a-nginx
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        add_header content-type text/plain;
        return 200 "A\n";
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ab-a
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: ab-a
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
---
