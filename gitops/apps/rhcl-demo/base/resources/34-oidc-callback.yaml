apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-callback
  namespace: rhcl-oidc-portal
  labels:
    app: oidc-callback
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oidc-callback
  template:
    metadata:
      labels:
        app: oidc-callback
    spec:
      containers:
        - name: node
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8080"
            - name: KEYCLOAK_TOKEN_URL
              value: "http://keycloak-service.rhcl-keycloak.svc.cluster.local:8080/auth/realms/rhcl/protocol/openid-connect/token"
            - name: OIDC_CLIENT_ID
              value: "rhcl-ui"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: oidc-callback
---
apiVersion: v1
kind: Service
metadata:
  name: oidc-callback
  namespace: rhcl-oidc-portal
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: oidc-callback
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oidc-callback
  namespace: rhcl-oidc-portal
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - oidc-rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
    - oidc-rhcl-workshop.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: GET
          path:
            type: Exact
            value: /auth/callback
        - method: HEAD
          path:
            type: Exact
            value: /auth/callback
        - method: GET
          path:
            type: Exact
            value: /logout
        - method: HEAD
          path:
            type: Exact
            value: /logout
        - method: GET
          path:
            type: Exact
            value: /whoami
        - method: HEAD
          path:
            type: Exact
            value: /whoami
      backendRefs:
        - group: ""
          kind: Service
          name: oidc-callback
          namespace: rhcl-oidc-portal
          port: 80
          weight: 1
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: oidc-callback-allow
  namespace: rhcl-oidc-portal
  annotations:
    argocd.argoproj.io/sync-wave: "32"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: oidc-callback
  defaults:
    rules:
      authorization:
        allow-all:
          opa:
            rego: "allow = true"

