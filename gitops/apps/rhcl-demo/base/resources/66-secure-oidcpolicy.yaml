apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  name: secure-demo-oidc
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "32"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: secure-demo
  provider:
    clientID: rhcl-ui
    issuerURL: https://REPLACE_ME_DEMO_HOSTNAME/auth/realms/rhcl
  auth:
    tokenSource:
      authorizationHeader:
        prefix: "Bearer"

