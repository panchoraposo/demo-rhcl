apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-bot-ai
  namespace: rhcl-ai-bot
  labels:
    app: rhcl-ai-bot
    service: rhcl-ai-bot
    deployment: rhcl-ai-bot
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - ai.REPLACE_ME_BASE_DOMAIN
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-ai-gw
      namespace: openshift-ingress
      sectionName: https-ai-sandbox
  rules:
    - matches:
        - method: POST
          path:
            type: PathPrefix
            value: /ai
        - method: OPTIONS
          path:
            type: PathPrefix
            value: /ai
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: access-control-allow-origin
                value: "*"
              - name: access-control-allow-methods
                value: "GET,POST,OPTIONS,HEAD"
              - name: access-control-allow-headers
                value: "content-type,authorization,accept,origin,x-requested-with"
              - name: access-control-expose-headers
                value: "mcp-session-id"
      backendRefs:
        - group: ""
          kind: Service
          name: rhcl-ai-bot
          port: 80
          weight: 1

