apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-proxy
  namespace: demo
  labels:
    app: external-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /external
      backendRefs:
        - group: ""
          kind: Service
          name: external-proxy
          port: 80
          weight: 1

