apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ab-demo
  namespace: demo
  labels:
    app: ab-demo
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /ab
      backendRefs:
        - group: ""
          kind: Service
          name: ab-a
          port: 80
          weight: 80
        - group: ""
          kind: Service
          name: ab-b
          port: 80
          weight: 20
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /canary
      backendRefs:
        - group: ""
          kind: Service
          name: canary-v1
          port: 80
          weight: 90
        - group: ""
          kind: Service
          name: canary-v2
          port: 80
          weight: 10
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /external
      backendRefs:
        - group: ""
          kind: Service
          name: external-proxy
          port: 80
          weight: 1

