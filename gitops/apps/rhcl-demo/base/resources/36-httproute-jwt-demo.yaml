apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwt-demo
  namespace: demo
  labels:
    app: jwt-demo
    service: external-proxy
    deployment: external-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  hostnames:
    - rhcl-workshop.apps.cluster-lmc6n.lmc6n.sandbox1529.opentlc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rhcl-gw
      namespace: openshift-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jwt/secure
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /external
      backendRefs:
        - group: ""
          kind: Service
          name: external-proxy
          port: 80
          weight: 1

