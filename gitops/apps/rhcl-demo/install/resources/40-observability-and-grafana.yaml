apiVersion: batch/v1
kind: Job
metadata:
  name: rhcl-grafana-thanos-token
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "95"
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: rhcl-observability-bootstrap
      restartPolicy: Never
      containers:
        - name: oc
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash","-lc"]
          args:
            - |
              set -euo pipefail
              TOKEN="$(oc -n monitoring create token rhcl-grafana --duration=168h)"
              URL="$(oc -n openshift-monitoring get route thanos-querier -o jsonpath='https://{.status.ingress[].host}' 2>/dev/null || true)"
              if [ -z "${URL:-}" ]; then
                URL="https://thanos-querier.openshift-monitoring.svc:9091"
              fi
              oc -n monitoring create secret generic rhcl-grafana-thanos \
                --from-literal=PROMETHEUS_TOKEN="$TOKEN" \
                --from-literal=THANOS_URL="$URL" \
                --dry-run=client -o yaml | oc apply -f -
              echo "OK: grafana datasource secret updated"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: rhcl-grafana
  namespace: monitoring
  labels:
    app: rhcl-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "96"
spec:
  config:
    auth:
      disable_login_form: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Viewer
    log:
      mode: console
  route:
    spec:
      host: REPLACE_ME_GRAFANA_HOSTNAME
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: rhcl-thanos
  namespace: monitoring
  labels:
    app: rhcl-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "97"
spec:
  instanceSelector:
    matchLabels:
      app: rhcl-grafana
  valuesFrom:
    - targetPath: "url"
      valueFrom:
        secretKeyRef:
          name: rhcl-grafana-thanos
          key: THANOS_URL
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: rhcl-grafana-thanos
          key: PROMETHEUS_TOKEN
  datasource:
    name: rhcl-thanos
    type: prometheus
    access: proxy
    isDefault: true
    url: "${THANOS_URL}"
    jsonData:
      tlsSkipVerify: true
      httpHeaderName1: "Authorization"
    secureJsonData:
      httpHeaderValue1: "Bearer ${PROMETHEUS_TOKEN}"
---
