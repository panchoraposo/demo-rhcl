quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Distributed tracing (OTel → in-cluster collector → Tempo)
quarkus.otel.enabled=true
quarkus.otel.service.name=rhcl-trace-svc
quarkus.otel.exporter.otlp.endpoint=http://otel-collector.rhcl-observability.svc:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.propagators=tracecontext,baggage

# Downstream target for a "child span" (in-cluster)
rhcl.trace.external-proxy.base-url=http://external-proxy.demo.svc.cluster.local

