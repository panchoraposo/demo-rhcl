quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Distributed tracing (OTel → in-cluster collector → Tempo)
quarkus.otel.enabled=true
quarkus.otel.service.name=rhcl-ai-bot
quarkus.otel.exporter.otlp.endpoint=http://otel-collector.rhcl-observability.svc:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.propagators=tracecontext,baggage

# Optional LLM config (OpenAI-compatible)
rhcl.ai.openai.base-url=https://litellm-prod.apps.maas.redhatworkshops.io/v1
rhcl.ai.openai.model=deepseek-r1-distill-qwen-14b

# Tool: ESPN proxy (in-cluster service)
rhcl.ai.espn.base-url=http://external-proxy.demo.svc.cluster.local

# Downstream trace demo service (in-cluster)
rhcl.ai.trace.base-url=http://rhcl-trace-svc.demo.svc.cluster.local

